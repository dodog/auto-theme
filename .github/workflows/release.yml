name: Package GNOME extension

# Builds the extension zip and attaches it to the GitHub Release whenever
# a release is published.
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  UUID: auto-themed@dodog.github.com

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gettext (for msgfmt)
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Stage extension files
        run: |
                BUILD_DIR="$RUNNER_TEMP/build"
                mkdir -p "$BUILD_DIR"
                # Copy everything except .git and po (translation sources aren't distributed)
                rsync -a --exclude='.git' --exclude='po' ./ "$BUILD_DIR"/
                echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
      - name: Compile translations
        run: |
          shopt -s nullglob
          for po in src/po/*.po; do
            lang=$(basename "$po" .po)
            mkdir -p "$BUILD_DIR/locale/$lang/LC_MESSAGES"
            msgfmt "$po" -o "$BUILD_DIR/locale/$lang/LC_MESSAGES/${UUID}.mo"
          done
      - name: Package extension
        run: |
          cd "$BUILD_DIR"
          zip -r "$GITHUB_WORKSPACE/${UUID}.zip" . -x '.*'

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.UUID }}.zip
